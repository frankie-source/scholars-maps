const badgeBg={university:"#e8f0fa","liberal arts":"#e4f3e6",community:"#faeae3"};
const typeLabel={university:"University / College","liberal arts":"Liberal Arts College",community:"Community College"};

document.getElementById("s-total").textContent=schools.length;
document.getElementById("s-states").textContent=new Set(schools.map(s=>s.state)).size;
document.getElementById("s-types").textContent="3 types";

const svgEl=document.getElementById("map-svg");
const svg=d3.select(svgEl);
const g=d3.select("#map-g");
const tooltip=document.getElementById("tooltip");
const mapWrap=document.getElementById("map-wrap");
const projection=d3.geoAlbersUsa().scale(1280).translate([480,300]);
const path=d3.geoPath().projection(projection);

const zoom=d3.zoom().scaleExtent([1,10])
  .on("start",()=>svgEl.classList.add("grabbing"))
  .on("zoom",(event)=>{
    const{transform}=event;
    g.attr("transform",transform);
    g.selectAll(".school-dot").attr("r",6/transform.k).attr("stroke-width",1.5/transform.k);
    g.selectAll(".state-path").attr("stroke-width",.5/transform.k);
  })
  .on("end",()=>svgEl.classList.remove("grabbing"));

svg.call(zoom);
document.getElementById("zoom-in").addEventListener("click",()=>svg.transition().duration(300).call(zoom.scaleBy,1.6));
document.getElementById("zoom-out").addEventListener("click",()=>svg.transition().duration(300).call(zoom.scaleBy,.625));
document.getElementById("reset-btn").addEventListener("click",()=>svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity));

fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
  .then(r=>r.json())
  .then(us=>{
    document.getElementById("loading").style.display="none";
    g.append("g").selectAll("path")
      .data(topojson.feature(us,us.objects.states).features)
      .join("path").attr("class","state-path").attr("d",path);
    g.append("path")
      .datum(topojson.mesh(us,us.objects.states,(a,b)=>a!==b))
      .attr("fill","none").attr("stroke","#ccc").attr("stroke-width",0.8).attr("d",path);
    g.selectAll("circle").data(schools).join("circle")
      .attr("class","school-dot")
      .attr("cx",d=>{const p=projection([d.lng,d.lat]);return p?p[0]:-99;})
      .attr("cy",d=>{const p=projection([d.lng,d.lat]);return p?p[1]:-99;})
      .attr("r",6).attr("fill",d=>colors[d.type])
      .attr("fill-opacity",.88).attr("stroke","#fff").attr("stroke-width",1.5)
      .on("mousemove",function(event,d){
        const rect=mapWrap.getBoundingClientRect();
        tooltip.style.display="block";
        tooltip.style.left=(event.clientX-rect.left+14)+"px";
        tooltip.style.top=(event.clientY-rect.top-10)+"px";
        tooltip.innerHTML=`<div class="t-name">${d.name}</div><div class="t-loc">${d.city}, ${d.state}</div><span class="t-badge" style="background:${badgeBg[d.type]};color:${colors[d.type]}">${typeLabel[d.type]}</span>`;
        d3.select(this).attr("stroke-width",2.5).attr("r",8);
      })
      .on("mouseleave",function(){
        tooltip.style.display="none";
        const k=d3.zoomTransform(svgEl).k;
        d3.select(this).attr("stroke-width",1.5/k).attr("r",6/k);
      });
  })
  .catch(()=>{document.getElementById("loading").textContent="Map failed to load.";});
</script>
</body>
</html>
